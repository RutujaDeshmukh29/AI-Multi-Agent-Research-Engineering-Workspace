# alembic.ini
# Database migration configuration
#
# CONCEPT: Alembic Migrations
# When you change your SQLAlchemy models (add a column, new table etc),
# you can't just re-run create_all() in production — it won't update existing tables.
# Alembic tracks every change as a "migration file" (like git commits for your DB schema).
# Run:  alembic revision --autogenerate -m "add column X"
# Then: alembic upgrade head
# Alembic compares your models vs actual DB and generates the SQL diff automatically.

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is overridden in alembic/env.py to use our settings
sqlalchemy.url = postgresql://placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
